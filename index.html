<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sambrit Adhikari</title>
  <meta name="description" content="Sambrit Adhikari, a program manager and engineer specializing in AI, machine learning, and software development."/>
  <meta name="keywords" content="Sambrit Adhikari, program manager, engineer, software development, AI, machine learning, LinkedIn, program management, product manager, technical program manager, artificial intelligence, data science"/>
  <meta name="author" content="Sambrit Adhikari"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://www.sambrit.com/"/>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&amp;family=Open+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet">

  <style>
  :root {
    --text: #FAFAFA;
    --accent: #FFD700;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    font-family: 'Open Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: var(--text);
    background: linear-gradient(160deg, #0a0d14 0%, #0b1020 50%, #0d1428 100%);
    overflow: hidden;
    position: relative;
  }

  #bg {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    z-index: 0;
    pointer-events: none;
  }

  .glow {
    position: fixed;
    inset: -10vmax;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(38vmax 38vmax at 20% 22%, rgba(71, 222, 232, 0.14), transparent 62%),
      radial-gradient(35vmax 35vmax at 80% 73%, rgba(250, 204, 21, 0.10), transparent 66%),
      radial-gradient(40vmax 40vmax at 50% 58%, rgba(244, 114, 182, 0.08), transparent 68%);
    filter: blur(9px);
  }

  .main-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    padding: 20px;
  }

  .kicker {
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 0.72rem;
    font-weight: 700;
    color: #BFFBFF;
    text-shadow: 0 2px 8px rgba(0,0,0,0.62);
  }

  .name {
    font-family: 'Montserrat', system-ui, sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 700;
    margin: 10px 0 0;
    color: var(--accent);
    letter-spacing: .6px;
    text-shadow: 0 2px 10px rgba(0,0,0,.8);
  }

  .nav-links {
    display: flex;
    gap: 12px;
    margin-top: 36px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .nav-link {
    text-decoration: none;
    font-weight: 600;
    color: var(--text);
    background: rgba(0,0,0,.35);
    padding: 10px 14px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    backdrop-filter: blur(6px);
    text-shadow: 0 2px 6px rgba(0,0,0,.6);
    border: 1px solid rgba(255,255,255,.08);
    transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
  }

  .nav-link:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 14px rgba(0,0,0,.35);
    background: rgba(255,255,255,.08);
  }

  .modal {
    position: fixed;
    inset: 0;
    z-index: 4;
    display: grid;
    place-items: center;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
  }

  .modal[hidden] {
    display: none;
  }

  .modal-card {
    background: rgba(15,15,20,0.9);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 18px;
    width: min(92vw, 380px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .modal-title {
    font-weight: 800;
    margin: 0 0 10px;
    letter-spacing: 0.3px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    user-select: none;
    background: rgba(255,255,255,0.08);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.15);
    transition: transform .15s ease, background .15s ease;
  }

  .btn:hover {
    transform: translateY(-1px);
    background: rgba(255,255,255,0.12);
  }

  .btn.primary {
    background: linear-gradient(90deg, #facc15, #22d3ee);
    color: #0a0a0a;
    font-weight: 800;
    border: none;
  }

  .launch-button {
    position: fixed;
    z-index: 3;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(24px + env(safe-area-inset-bottom));
    padding: 12px 26px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 1rem;
    color: #0a0a0a;
    background: var(--accent);
    border: none;
    cursor: pointer;
    user-select: none;
    transition: transform .2s ease, filter .2s ease;
    touch-action: manipulation;
  }

  .launch-button:hover {
    transform: translateX(-50%) translateY(-2px);
    filter: brightness(1.08);
  }

  .launch-button:active {
    transform: translateX(-50%) scale(0.97);
  }

  .rocket {
    position: fixed;
    font-size: 2rem;
    z-index: 4;
    pointer-events: none;
    animation: rocketFly 3.2s forwards cubic-bezier(.2,.6,.3,1);
  }

  @keyframes rocketFly {
    0%   { transform: translate(0, 0); opacity: 1; }
    75%  { opacity: 1; }
    100% { transform: translate(var(--dx, 50vw), -100vh); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .nav-link { transition: none !important; }
    .btn { transition: none !important; }
    .launch-button { transition: none !important; }
  }

  @media (max-width: 700px) {
    .kicker { font-size: .64rem; }
    .nav-link { font-size: .92rem; padding: 10px 13px; }
  }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="glow" aria-hidden="true"></div>

  <div class="main-content">
    <p class="kicker">Program Manager + Engineer + Photographer</p>
    <h1 class="name">Sambrit Adhikari</h1>

    <div class="nav-links">
      <button class="nav-link contact-btn" type="button">Contact</button>
      <a href="https://github.com/sambrit" class="nav-link">GitHub</a>
      <a href="https://www.instagram.com/catchavibephotos/" class="nav-link">Photography 📷</a>
      <a href="https://www.linkedin.com/in/sambritadhikari/" class="nav-link">LinkedIn</a>
    </div>
  </div>

  <button class="launch-button" aria-label="Launch">Launch 🚀</button>

  <div class="modal" id="contactModal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="contactTitle">
      <h3 class="modal-title" id="contactTitle">Get in touch</h3>
      <p style="opacity:.8;margin:0 0 14px;">Choose how you'd like to reach me.</p>
      <div class="modal-actions">
        <button class="btn primary" id="mailOpenBtn" type="button">Open mail app</button>
        <button class="btn" id="copyBtn" type="button">Copy email</button>
        <button class="btn" id="closeModalBtn" type="button">Close</button>
      </div>
    </div>
  </div>

  <script>
/* ========================= CONTACT ========================= */
const contactBtn = document.querySelector('.contact-btn');
const modal = document.getElementById('contactModal');
const mailOpenBtn = document.getElementById('mailOpenBtn');
const copyBtn = document.getElementById('copyBtn');
const closeModalBtn = document.getElementById('closeModalBtn');

function buildEmail() {
  return ['sambrit','adhikari'].join('') + String.fromCharCode(64) + ['gmail','com'].join('.');
}

function closeModal() { modal.hidden = true; }

contactBtn.addEventListener('click', () => { modal.hidden = false; });
closeModalBtn.addEventListener('click', closeModal);
modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

mailOpenBtn.addEventListener('click', () => {
  window.location.href = 'mailto:' + buildEmail();
  closeModal();
});

copyBtn.addEventListener('click', async () => {
  const email = buildEmail();
  try {
    await navigator.clipboard.writeText(email);
    copyBtn.textContent = 'Copied!';
    setTimeout(() => { copyBtn.textContent = 'Copy email'; }, 1200);
  } catch {
    copyBtn.textContent = email;
  }
});

/* ========================= LAUNCH BUTTON ========================= */
const launchBtn = document.querySelector('.launch-button');
launchBtn.addEventListener('click', () => {
  const rocket = document.createElement('div');
  rocket.className = 'rocket';
  rocket.textContent = '🚀';
  const rect = launchBtn.getBoundingClientRect();
  rocket.style.left = (rect.left + rect.width / 2 - 16) + 'px';
  rocket.style.top = (rect.top - 10) + 'px';
  const dir = Math.random() < 0.25 ? -1 : 1;
  rocket.style.setProperty('--dx', (dir * (40 + Math.random() * 25)) + 'vw');
  document.body.appendChild(rocket);
  setTimeout(() => rocket.remove(), 3300);
});

/* ========================= STARFIELD ========================= */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d', { alpha: true });
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

let dpr = 1;
let stars = [];
let shootingStar = null;
let nextShootingStarAt = 0;

const pointer = { x: 0.5, y: 0.5 };
const smooth = { x: 0.5, y: 0.5 };

addEventListener('mousemove', (e) => {
  pointer.x = e.clientX / innerWidth;
  pointer.y = e.clientY / innerHeight;
}, { passive: true });

addEventListener('touchmove', (e) => {
  if (!e.touches.length) return;
  pointer.x = e.touches[0].clientX / innerWidth;
  pointer.y = e.touches[0].clientY / innerHeight;
}, { passive: true });

function rand(min, max) { return Math.random() * (max - min) + min; }

function initStars() {
  const count = Math.floor((innerWidth * innerHeight) / 2800);
  stars = [];
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random(),
      y: Math.random(),
      r: rand(0.3, 1.4),
      o: rand(0.25, 0.85),
      depth: rand(0.15, 1.0),
      phase: rand(0, Math.PI * 2),
      speed: rand(0.0003, 0.0008)
    });
  }
}

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 1.75);
  canvas.width = Math.floor(innerWidth * dpr);
  canvas.height = Math.floor(innerHeight * dpr);
  canvas.style.width = '100vw';
  canvas.style.height = '100vh';
  initStars();
}

addEventListener('resize', resize, { passive: true });
addEventListener('orientationchange', resize, { passive: true });

function createShootingStar() {
  const fromLeft = Math.random() < 0.5;
  return {
    x: fromLeft ? -0.1 * canvas.width : 1.1 * canvas.width,
    y: rand(0.08, 0.65) * canvas.height,
    vx: (fromLeft ? 1 : -1) * rand(0.5, 0.9) * dpr,
    vy: rand(-0.08, 0.14) * dpr,
    length: rand(100, 190) * dpr,
    width: rand(1.2, 2.2) * dpr,
    life: rand(900, 1500)
  };
}

let last = performance.now();

function loop(now) {
  const dt = Math.min(33, now - last);
  last = now;

  const w = canvas.width;
  const h = canvas.height;

  smooth.x += (pointer.x - smooth.x) * 0.05;
  smooth.y += (pointer.y - smooth.y) * 0.05;
  const mx = smooth.x - 0.5;
  const my = smooth.y - 0.5;

  ctx.clearRect(0, 0, w, h);

  for (const s of stars) {
    const twinkle = reduceMotion ? 1 : (0.78 + 0.22 * Math.sin(s.phase + now * s.speed));
    const px = (s.x + mx * s.depth * 0.06) * w;
    const py = (s.y + my * s.depth * 0.06) * h;

    ctx.globalAlpha = s.o * twinkle;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(px, py, s.r * dpr, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;

  if (!reduceMotion) {
    if (!shootingStar && now >= nextShootingStarAt) {
      shootingStar = createShootingStar();
    }

    if (shootingStar) {
      const c = shootingStar;
      c.x += c.vx * dt * 0.16;
      c.y += c.vy * dt * 0.16;
      c.life -= dt;

      const tx = c.x - c.vx * c.length;
      const ty = c.y - c.vy * c.length;
      const grad = ctx.createLinearGradient(c.x, c.y, tx, ty);
      grad.addColorStop(0, 'rgba(255,255,255,0.90)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');

      ctx.strokeStyle = grad;
      ctx.lineWidth = c.width;
      ctx.beginPath();
      ctx.moveTo(c.x, c.y);
      ctx.lineTo(tx, ty);
      ctx.stroke();

      if (c.life <= 0 || c.x < -0.2 * w || c.x > 1.2 * w) {
        shootingStar = null;
        nextShootingStarAt = now + rand(2500, 7000);
      }
    }
  }

  requestAnimationFrame(loop);
}

resize();
requestAnimationFrame(loop);
  </script>

  {
    "@context": "https://schema.org",

  </script>
</body>
</html>
